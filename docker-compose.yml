services:
  base:
    image: postgres:16
    container_name: db_container
    environment:
      POSTGRES_DB: registro_visitas
      POSTGRES_USER: amg_user
      POSTGRES_PASSWORD: amg_secret
    volumes: ["datos_pg:/var/lib/postgresql/data"]
    networks: ["red_amg"]
  web:
    build: .
    container_name: myapp_container
    environment:
      DB_HOST: base
      DB_NAME: registro_visitas
      DB_USER: amg_user
      DB_PASSWORD: amg_secret
      DB_PORT: 5432
    depends_on: ["base"]
    networks: ["red_amg"]
  proxy:
    image: nginx:stable
    container_name: mynginx_container
    ports: ["80:80"]
    volumes: ["./nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro"]
    depends_on: ["web"]
    networks: ["red_amg"]
networks:
  red_amg:
    driver: bridge
volumes:
  datos_pg: